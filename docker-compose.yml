services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartpoint_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - smartpoint_network
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:alpine
    container_name: smartpoint_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - smartpoint_network
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: smartpoint_mysql
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-root}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - smartpoint_network

  redis:
    image: redis:7-alpine
    container_name: smartpoint_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - smartpoint_network

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartpoint_queue
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - smartpoint_network
    depends_on:
      - mysql
      - redis
    command: php artisan queue:work --tries=3 --timeout=90

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartpoint_scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - smartpoint_network
    depends_on:
      - mysql
      - redis
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 3600; done"

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  smartpoint_network:
    driver: bridge

